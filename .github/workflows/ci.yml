name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SOLUTION_FILE: TwoServicesHttp.slnx
      DOTNET_VERSION: 10.0.x
      MINIMUM_LINE_COVERAGE: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Check formatting
        run: dotnet format ${{ env.SOLUTION_FILE }} --verify-no-changes --no-restore --verbosity normal

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test ${{ env.SOLUTION_FILE }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html;HtmlSummary;Cobertura;MarkdownSummaryGithub" \
            -assemblyfilters:"+CatalogService.*;+PricingService.*;-*.Tests.*" \
            -classfilters:"-Microsoft.AspNetCore.OpenApi.Generated.*" \
            -filefilters:"-**/obj/**;-**/*.g.cs;-**/*.generated.cs;-**/*SourceGenerators*"

      - name: Add coverage summary to job summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        shell: pwsh
        run: |
          ./scripts/check-coverage.ps1 `
            -CoverageFile "coveragereport/Cobertura.xml" `
            -MinimumLineCoverage "${{ env.MINIMUM_LINE_COVERAGE }}"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coveragereport

      - name: Upload raw coverage files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: raw-coverage-files
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  docker-security-scan:
    name: Docker image security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    env:
      CATALOG_IMAGE: micros-02-catalog-service-api:ci
      PRICING_IMAGE: micros-02-pricing-service-api:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Catalog Service Docker image
        run: |
          docker build \
          --file src/CatalogService/CatalogService.Api/Dockerfile \
          --tag ${{ env.CATALOG_IMAGE }} \
          .

      - name: Build Pricing Service Docker image
        run: |
          docker build \
          --file src/PricingService/PricingService.Api/Dockerfile \
          --tag ${{ env.PRICING_IMAGE }} \
          .

      - name: Scan Catalog Service Docker image
        id: catalog-scan
        uses: anchore/scan-action@v7.4.0
        with:
          image: ${{ env.CATALOG_IMAGE }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: sarif
          output-file: catalog-service-grype.sarif

      - name: Scan Pricing Service Docker image
        id: pricing-scan
        uses: anchore/scan-action@v7.4.0
        with:
          image: ${{ env.PRICING_IMAGE }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: sarif
          output-file: pricing-service-grype.sarif

      - name: Create SBOM output directory
        run: mkdir -p sbom

      - name: Generate Catalog Service SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.CATALOG_IMAGE }}
          format: spdx-json
          output-file: sbom/catalog-service.spdx.json
          upload-artifact: false

      - name: Generate Pricing Service SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.PRICING_IMAGE }}
          format: spdx-json
          output-file: sbom/pricing-service.spdx.json
          upload-artifact: false

      - name: Upload Catalog Service scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: catalog-service-vulnerability-scan
          path: catalog-service-grype.sarif
          if-no-files-found: warn

      - name: Upload Pricing Service scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pricing-service-vulnerability-scan
          path: pricing-service-grype.sarif
          if-no-files-found: warn

      - name: Upload Docker image SBOMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-sboms
          path: sbom/*.spdx.json
          if-no-files-found: warn

  docker-compose-smoke-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    env:
      COMPOSE_PROJECT_NAME: twoservicesoverhttp-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Start Docker Compose stack
        run: |
          docker compose up \
            --build \
            --wait \
            --wait-timeout 180

      - name: Show Docker Compose status
        if: always()
        run: docker compose ps

      - name: Check Catalog Service readiness endpoint
        run: curl --fail --show-error --silent http://localhost:5101/health/ready

      - name: Check Pricing Service readiness endpoint
        run: curl --fail --show-error --silent http://localhost:5102/health/ready

      - name: Show Docker Compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans