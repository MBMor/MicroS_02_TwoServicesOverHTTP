name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SOLUTION_FILE: TwoServicesHttp.slnx
      DOTNET_VERSION: 10.0.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Check formatting
        run: dotnet format ${{ env.SOLUTION_FILE }} --verify-no-changes --no-restore --verbosity normal

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test ${{ env.SOLUTION_FILE }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html;HtmlSummary;Cobertura;MarkdownSummaryGithub" \
            -assemblyfilters:"+CatalogService.*;+PricingService.*;-*.Tests.*" \
            -classfilters:"-Microsoft.AspNetCore.OpenApi.Generated.*" \
            -filefilters:"-**/obj/**;-**/*.g.cs;-**/*.generated.cs;-**/*SourceGenerators*"

      - name: Add coverage summary to job summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport

      - name: Upload raw coverage files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-coverage-files
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn